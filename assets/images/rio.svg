<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="300" fill="#87CEEB"/>
  <!-- Mountain -->
  <polygon points="0,300 400,50 800,300" fill="#8B7355"/>
  <!-- Beach/Sand -->
  <rect y="300" width="800" height="300" fill="#F4A460"/>
  <!-- Ocean -->
  <ellipse cx="100" cy="350" rx="60" ry="40" fill="#1E90FF"/>
  <ellipse cx="300" cy="380" rx="80" ry="50" fill="#1E90FF"/>
  <!-- Christ the Redeemer statue -->
  <polygon points="400,80 390,180 410,180" fill="#D3D3D3"/>
  <polygon points="360,140 440,140 400,120" fill="#D3D3D3"/>
  <!-- Beach people umbrellas -->
  <line x1="500" y1="320" x2="500" y2="400" stroke="#8B4513" stroke-width="2"/>
  <polygon points="500,320 470,340 530,340" fill="#FF6347"/>
  <line x1="600" y1="330" x2="600" y2="410" stroke="#8B4513" stroke-width="2"/>
  <polygon points="600,330 570,350 630,350" fill="#FFD700"/>
  <!-- Text -->
  <text x="400" y="40" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">Rio de Janeiro, Brazil</text>
</svg>