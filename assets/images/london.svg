<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="350" fill="#B0C4DE"/>
  <!-- River Thames -->
  <path d="M 0 350 Q 200 400 400 350 T 800 350 L 800 420 Q 400 450 0 420 Z" fill="#4169E1"/>
  <!-- Buildings background -->
  <rect x="50" y="280" width="110" height="370" fill="#8B7355"/>
  <rect x="200" y="200" width="100" height="450" fill="#A0826D"/>
  <rect x="550" y="260" width="120" height="390" fill="#8B7355"/>
  <!-- Big Ben -->
  <rect x="390" y="100" width="20" height="280" fill="#DAA520"/>
  <polygon points="400,80 385,100 415,100" fill="#FFD700"/>
  <!-- Clock face -->
  <circle cx="400" cy="180" r="15" fill="#FFFACD"/>
  <line x1="400" y1="180" x2="400" y2="165" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="180" x2="410" y2="180" stroke="#000" stroke-width="2"/>
  <!-- London Eye (Ferris wheel) -->
  <circle cx="200" cy="250" r="50" fill="none" stroke="#FF6347" stroke-width="3"/>
  <circle cx="200" cy="200" r="3" fill="#FF6347"/>
  <!-- Text -->
  <text x="400" y="50" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">London, UK</text>
</svg>