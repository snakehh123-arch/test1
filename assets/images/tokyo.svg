<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="300" fill="#FF6B9D"/>
  <!-- Sun/Moon -->
  <circle cx="100" cy="80" r="40" fill="#FFD700"/>
  <!-- Buildings -->
  <rect x="50" y="300" width="120" height="300" fill="#FF3333"/>
  <rect x="200" y="250" width="100" height="350" fill="#FF5555"/>
  <rect x="350" y="200" width="150" height="400" fill="#FF7777"/>
  <rect x="550" y="280" width="120" height="320" fill="#FF5555"/>
  <!-- Tokyo Tower -->
  <polygon points="400,150 380,200 420,200" fill="#FF0000"/>
  <rect x="395" y="200" width="10" height="150" fill="#FF0000"/>
  <!-- Windows -->
  <circle cx="70" cy="320" r="4" fill="#FFFF00"/>
  <circle cx="70" cy="360" r="4" fill="#FFFF00"/>
  <circle cx="70" cy="400" r="4" fill="#FFFF00"/>
  <circle cx="220" cy="280" r="4" fill="#FFFF00"/>
  <circle cx="220" cy="320" r="4" fill="#FFFF00"/>
  <!-- Text -->
  <text x="400" y="100" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">Tokyo, Japan</text>
</svg>