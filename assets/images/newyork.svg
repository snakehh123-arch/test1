<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="350" fill="#4A90E2"/>
  <!-- Buildings/Skyline -->
  <rect x="50" y="250" width="100" height="350" fill="#333"/>
  <rect x="180" y="180" width="90" height="420" fill="#444"/>
  <rect x="310" y="120" width="120" height="480" fill="#555"/>
  <rect x="480" y="200" width="100" height="400" fill="#333"/>
  <rect x="630" y="280" width="100" height="320" fill="#444"/>
  <!-- Empire State Building highlight -->
  <polygon points="370,100 350,120 390,120" fill="#FFD700"/>
  <!-- Windows -->
  <rect x="60" y="270" width="8" height="8" fill="#FFFF00"/>
  <rect x="60" y="300" width="8" height="8" fill="#FFFF00"/>
  <rect x="60" y="330" width="8" height="8" fill="#FFFF00"/>
  <rect x="200" y="200" width="8" height="8" fill="#FFFF00"/>
  <rect x="200" y="240" width="8" height="8" fill="#FFFF00"/>
  <rect x="330" y="150" width="10" height="10" fill="#FFFF00"/>
  <rect x="330" y="200" width="10" height="10" fill="#FFFF00"/>
  <!-- Statue of Liberty silhouette -->
  <circle cx="100" cy="380" r="15" fill="#90EE90"/>
  <polygon points="100,340 90,365 110,365" fill="#90EE90"/>
  <!-- Text -->
  <text x="400" y="50" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">New York, USA</text>
</svg>