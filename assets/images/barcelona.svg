<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="350" fill="#87CEEB"/>
  <!-- Sea -->
  <rect y="350" width="800" height="250" fill="#1E90FF"/>
  <!-- Sagrada Familia -->
  <polygon points="400,100 370,200 430,200" fill="#FF69B4"/>
  <rect x="385" y="200" width="30" height="200" fill="#FF69B4"/>
  <!-- Towers -->
  <rect x="375" y="120" width="8" height="80" fill="#FFB6C1"/>
  <rect x="417" y="120" width="8" height="80" fill="#FFB6C1"/>
  <!-- Park Güell elements -->
  <circle cx="200" cy="400" r="30" fill="#90EE90"/>
  <polygon points="180,380 170,400 190,400" fill="#228B22"/>
  <!-- Beach -->
  <ellipse cx="600" cy="450" rx="80" ry="40" fill="#F4A460"/>
  <!-- Beach umbrellas -->
  <line x1="550" y1="420" x2="550" y2="480" stroke="#8B4513" stroke-width="2"/>
  <polygon points="550,420 530,435 570,435" fill="#FF6347"/>
  <line x1="650" y1="420" x2="650" y2="480" stroke="#8B4513" stroke-width="2"/>
  <polygon points="650,420 630,435 670,435" fill="#4169E1"/>
  <!-- Text -->
  <text x="400" y="70" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">Barcelona, Spain</text>
</svg>