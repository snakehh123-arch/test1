<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="350" fill="#87CEEB"/>
  <!-- Water -->
  <rect y="350" width="800" height="250" fill="#1E90FF"/>
  <!-- Sydney Opera House (shells) -->
  <path d="M 350 250 Q 350 180 400 200 Q 450 180 450 250" fill="#F0F8FF" stroke="#333" stroke-width="2"/>
  <path d="M 420 250 Q 420 180 470 200 Q 520 180 520 250" fill="#E0E8F8" stroke="#333" stroke-width="2"/>
  <!-- Harbour Bridge -->
  <path d="M 300 280 Q 400 150 500 280" fill="none" stroke="#DC143C" stroke-width="8"/>
  <!-- Beach -->
  <ellipse cx="650" cy="450" rx="100" ry="50" fill="#F4A460"/>
  <!-- People on beach -->
  <circle cx="600" cy="480" r="4" fill="#333"/>
  <circle cx="650" cy="490" r="4" fill="#333"/>
  <circle cx="700" cy="485" r="4" fill="#333"/>
  <!-- Water waves -->
  <path d="M 200 400 Q 250 380 300 400" fill="none" stroke="#00CED1" stroke-width="2"/>
  <path d="M 400 420 Q 450 400 500 420" fill="none" stroke="#00CED1" stroke-width="2"/>
  <!-- Text -->
  <text x="400" y="100" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">Sydney, Australia</text>
</svg>