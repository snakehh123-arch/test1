<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Sky -->
  <rect width="800" height="350" fill="#87CEEB"/>
  <!-- Water -->
  <rect y="350" width="800" height="250" fill="#1E90FF"/>
  <!-- Gardens by the Bay (flower domes) -->
  <ellipse cx="200" cy="300" rx="50" ry="60" fill="#228B22"/>
  <ellipse cx="180" cy="280" rx="35" ry="45" fill="#32CD32"/>
  <!-- Marina Bay Sands (towers) -->
  <rect x="350" y="80" width="40" height="350" fill="#C0C0C0"/>
  <rect x="410" y="100" width="40" height="330" fill="#D3D3D3"/>
  <rect x="470" y="90" width="40" height="340" fill="#C0C0C0"/>
  <!-- Connecting structure on top -->
  <rect x="345" y="70" width="175" height="25" fill="#FFD700"/>
  <!-- Chinatown lanterns -->
  <circle cx="100" cy="250" r="12" fill="#FF0000"/>
  <circle cx="130" cy="240" r="12" fill="#FF0000"/>
  <circle cx="160" cy="250" r="12" fill="#FF0000"/>
  <!-- Street -->
  <rect y="400" width="800" height="50" fill="#D2B48C"/>
  <!-- People shopping -->
  <circle cx="300" cy="420" r="3" fill="#333"/>
  <circle cx="350" cy="425" r="3" fill="#333"/>
  <circle cx="400" cy="420" r="3" fill="#333"/>
  <!-- Text -->
  <text x="400" y="50" font-size="24" fill="#000" text-anchor="middle" font-weight="bold">Singapore</text>
</svg>